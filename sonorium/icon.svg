<svg xmlns="http://www.w3.org/2000/svg" viewBox="-18 -18 236 236">
  <defs>
    <radialGradient id="sphere" cx="36%" cy="30%" r="74%">
      <stop offset="0%"   stop-color="#d0d1ff"/>
      <stop offset="20%"  stop-color="#8e8ff9"/>
      <stop offset="52%"  stop-color="#3632a8"/>
      <stop offset="100%" stop-color="#07051a"/>
    </radialGradient>
    <radialGradient id="ambient" cx="50%" cy="54%" r="50%">
      <stop offset="0%"   stop-color="#5545d8" stop-opacity="0.75"/>
      <stop offset="52%"  stop-color="#2e1e90" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0d0630" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hl" cx="34%" cy="27%" r="54%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rim" cx="74%" cy="76%" r="44%">
      <stop offset="0%"   stop-color="#7b7cf7" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#7b7cf7" stop-opacity="0"/>
    </radialGradient>
    <filter id="outerGlowWide" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
    <filter id="outerGlowTight" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5.5"/>
    </filter>
    <filter id="glow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
    <filter id="corona" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="coronaTight" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="soft" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <clipPath id="round">
      <rect width="200" height="200" rx="46"/>
    </clipPath>
  </defs>

  <!-- Outer glow — wide, soft -->
  <rect x="1" y="1" width="198" height="198" rx="45"
        fill="#4433cc" opacity="0.55" filter="url(#outerGlowWide)"/>

  <!-- Outer glow — tight, vivid -->
  <rect x="3" y="3" width="194" height="194" rx="44"
        fill="#7060f0" opacity="0.40" filter="url(#outerGlowTight)"/>

  <!-- Background -->
  <rect width="200" height="200" fill="#05050a" rx="46"/>

  <g clip-path="url(#round)">
    <!-- Ambient glow -->
    <circle cx="100" cy="104" r="92" fill="url(#ambient)" filter="url(#glow)"/>

    <!-- Sound-wave rings -->
    <circle cx="100" cy="100" r="84" fill="none" stroke="#6c6ce8" stroke-width="0.9" opacity="0.22"/>
    <circle cx="100" cy="100" r="95" fill="none" stroke="#5555cc" stroke-width="0.7" opacity="0.12"/>
    <circle cx="100" cy="100" r="106" fill="none" stroke="#4444b0" stroke-width="0.5" opacity="0.06"/>

    <!-- Sphere corona — wide bloom -->
    <circle cx="100" cy="100" r="80" fill="#5040d8" opacity="0.55" filter="url(#corona)"/>

    <!-- Sphere corona — tight bright ring -->
    <circle cx="100" cy="100" r="75" fill="#8878ff" opacity="0.45" filter="url(#coronaTight)"/>

    <!-- Sphere -->
    <circle cx="100" cy="100" r="73" fill="url(#sphere)"/>

    <!-- Rim light -->
    <circle cx="100" cy="100" r="73" fill="url(#rim)"/>

    <!-- Inner fresnel highlight -->
    <circle cx="100" cy="100" r="73" fill="url(#hl)"/>

    <!-- Specular soft blob -->
    <ellipse cx="82" cy="77" rx="22" ry="15"
             fill="white" opacity="0.13" filter="url(#soft)"/>

    <!-- Specular hot spot -->
    <circle cx="77" cy="72" r="6.5" fill="white" opacity="0.28" filter="url(#soft)"/>
    <circle cx="75" cy="70" r="3.2" fill="white" opacity="0.70"/>
  </g>
</svg>
