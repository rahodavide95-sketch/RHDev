<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIFT — serendipity engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c-bg: #05050a;
    --c-surface: rgba(255,255,255,0.03);
    --c-border: rgba(255,255,255,0.07);
    --c-border-hover: rgba(255,255,255,0.14);
    --c-text-primary: #e8e8f0;
    --c-text-secondary: #555566;
    --c-text-muted: #2a2a38;
    --c-accent: #7a6aff;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --sphere-color-a: #2a2a4a;
    --sphere-color-b: #0a0a18;
    --sphere-glow: rgba(100, 80, 255, 0.15);
    --ring-color: rgba(120, 100, 255, 0.12);
  }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--c-bg);
    color: var(--c-text-primary);
    font-family: var(--font-body);
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    opacity: 0.025;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* ── AMBIENT CANVAS ── */
  #ambient-canvas {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* ── BG GLOW ── */
  #bg-glow {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
    background: radial-gradient(ellipse 60% 50% at 50% 40%, var(--sphere-glow), transparent);
    transition: background 2s ease;
  }

  /* ── LAYOUT ── */
  .app {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 4rem;
  }

  /* ── HEADER ── */
  header {
    width: 100%; max-width: 480px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4rem;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.3em;
    color: var(--c-text-secondary);
    text-transform: uppercase;
  }

  .spin-badge {
    font-size: 11px;
    color: var(--c-text-muted);
    letter-spacing: 0.1em;
    font-family: var(--font-body);
    transition: color 1s ease;
    font-variant-numeric: tabular-nums;
  }

  /* ── SPHERE ── */
  .sphere-wrap {
    position: relative;
    width: 220px; height: 220px;
    cursor: pointer;
    margin-bottom: 3.5rem;
    flex-shrink: 0;
  }

  .sphere-wrap:hover .sphere { transform: scale(1.04); }
  .sphere-wrap:active .sphere { transform: scale(0.96); }

  .sphere-ring {
    position: absolute;
    border-radius: 50%;
    border: 0.5px solid var(--ring-color);
    transition: border-color 2s ease;
    pointer-events: none;
  }

  .ring-1 { inset: -16px; animation: ring-pulse 4s ease-in-out infinite; }
  .ring-2 { inset: -36px; animation: ring-pulse 4s ease-in-out infinite 1.4s; opacity: 0.6; }
  .ring-3 { inset: -60px; animation: ring-pulse 6s ease-in-out infinite 0.7s; opacity: 0.3; }
  .ring-4 { inset: -90px; animation: ring-pulse 8s ease-in-out infinite 2s; opacity: 0.15; }

  @keyframes ring-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.015); opacity: 1; }
  }

  .sphere {
    width: 220px; height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle at 36% 32%, var(--sphere-color-a), var(--sphere-color-b) 70%);
    box-shadow: 0 0 80px var(--sphere-glow), 0 0 160px rgba(0,0,0,0.5), inset 0 0 60px rgba(0,0,0,0.6);
    transition: background 1.5s ease, box-shadow 1.5s ease, transform 0.2s ease;
    position: relative; z-index: 2;
  }

  .sphere::after {
    content: '';
    position: absolute;
    top: 18%; left: 22%;
    width: 28%; height: 20%;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    filter: blur(6px);
    pointer-events: none;
  }

  .sphere-hint {
    position: absolute;
    bottom: -32px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--c-text-muted);
    letter-spacing: 0.14em;
    white-space: nowrap;
    font-family: var(--font-body);
    text-transform: uppercase;
    transition: color 0.4s, opacity 0.4s;
  }
  .sphere-wrap:hover .sphere-hint { color: var(--c-text-secondary); }

  /* ── RESULT CARD ── */
  .result-card {
    width: 100%; max-width: 480px;
    background: rgba(8,8,16,0.8);
    border: 0.5px solid var(--c-border);
    border-radius: 20px;
    padding: 2rem 2.25rem 1.75rem;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.7s ease, transform 0.7s ease, border-color 1.5s ease;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .result-card.visible { opacity: 1; transform: translateY(0); }

  .card-header { margin-bottom: 1.25rem; }

  .sound-name {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 500;
    color: var(--c-text-primary);
    letter-spacing: -0.01em;
    margin-bottom: 0.35rem;
    transition: color 1s ease;
    line-height: 1.2;
  }

  .sound-meta {
    font-size: 11px;
    color: var(--c-text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 1s ease;
    font-family: var(--font-body);
  }

  .divider {
    height: 0.5px;
    background: var(--c-border);
    margin: 1.25rem 0;
    transition: background 1.5s ease;
  }

  .sound-desc {
    font-size: 14px;
    line-height: 1.8;
    color: var(--c-text-secondary);
    margin-bottom: 1.5rem;
    transition: color 1s ease;
    min-height: 3rem;
  }

  .sound-desc.loading {
    color: var(--c-text-muted);
    font-style: italic;
  }

  .cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: var(--c-accent);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
    border-radius: 1px;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .tags {
    display: flex; flex-wrap: wrap;
    gap: 6px; margin-bottom: 1.75rem;
  }

  .tag {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.07em;
    font-family: var(--font-body);
    transition: color 1s ease, border-color 1s ease, background 1s ease;
    color: var(--c-text-secondary);
    border: 0.5px solid var(--c-border);
    background: transparent;
  }

  /* ── ACTIONS ── */
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    font-family: var(--font-body);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 8px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: color 0.25s, background 0.25s, border-color 0.25s, transform 0.15s;
    border: 0.5px solid var(--c-border);
    background: transparent;
    color: var(--c-text-secondary);
  }

  .btn:hover { color: var(--c-text-primary); border-color: var(--c-border-hover); background: rgba(255,255,255,0.04); }
  .btn:active { transform: scale(0.97); }

  .btn-accent {
    transition: color 1s ease, border-color 1s ease, background 1s ease, transform 0.15s;
  }

  .btn-accent:hover { filter: brightness(1.15); }

  /* ── TECH SHEET ── */
  .tech-sheet {
    display: none;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 0.5px solid var(--c-border);
  }

  .tech-sheet.visible { display: block; }

  .tech-title {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--c-text-muted);
    margin-bottom: 1rem;
    font-family: var(--font-body);
  }

  .tech-content {
    font-size: 13px;
    line-height: 1.75;
    color: var(--c-text-secondary);
    min-height: 2rem;
  }

  /* ── PARTICLES ── */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    animation: particle-out var(--dur, 1.8s) var(--ease, ease-out) forwards;
  }

  @keyframes particle-out {
    0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(var(--rot,0deg)); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.1) rotate(var(--rot,0deg)); }
  }

  /* ── RIPPLE ── */
  .ripple {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 99;
    animation: ripple-expand var(--rdur, 1s) cubic-bezier(0.1, 0.8, 0.3, 1) var(--rdelay, 0ms) forwards;
  }

  @keyframes ripple-expand {
    from { transform: translate(-50%, -50%) scale(1); opacity: var(--rop, 0.7); }
    to   { transform: translate(-50%, -50%) scale(60); opacity: 0; }
  }

  /* ── API KEY MODAL ── */
  .key-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(5,5,10,0.85);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  .key-overlay.hidden { display: none; }

  .key-box {
    width: 100%; max-width: 400px;
    background: rgba(12,12,22,0.95);
    border: 0.5px solid var(--c-border-hover);
    border-radius: 20px;
    padding: 2rem 2.25rem;
  }

  .key-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 500;
    color: var(--c-text-primary);
    margin-bottom: 0.4rem;
  }

  .key-sub {
    font-size: 12px;
    color: var(--c-text-secondary);
    line-height: 1.6;
    margin-bottom: 1.25rem;
  }

  .key-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid var(--c-border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--c-text-primary);
    letter-spacing: 0.04em;
    outline: none;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .key-input:focus { border-color: var(--c-border-hover); }
  .key-input::placeholder { color: var(--c-text-muted); }

  .key-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .btn-key {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--c-text-muted);
    font-size: 15px;
    line-height: 1;
    transition: color 0.2s;
  }
  .btn-key:hover { color: var(--c-text-secondary); }
  .btn-key.has-key { color: var(--c-accent); opacity: 0.5; }

  /* ── FOOTER ── */
  footer {
    margin-top: 4rem;
    font-size: 11px;
    color: var(--c-text-muted);
    letter-spacing: 0.1em;
    text-align: center;
    text-transform: uppercase;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 520px) {
    .sphere-wrap { width: 180px; height: 180px; }
    .sphere { width: 180px; height: 180px; }
    .result-card { padding: 1.5rem 1.5rem 1.25rem; }
    .sound-name { font-size: 22px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .sphere-ring, #ambient-canvas { animation: none !important; }
    .cursor { animation: none !important; opacity: 1; }
    * { transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<canvas id="ambient-canvas"></canvas>
<div id="bg-glow"></div>

<div class="app">

  <header>
    <span class="logo">Drift</span>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="spin-badge" id="spin-badge">— / —</span>
      <button class="btn-key" id="btn-key" title="API Key">⚷</button>
    </div>
  </header>

  <!-- API KEY MODAL -->
  <div class="key-overlay hidden" id="key-overlay">
    <div class="key-box">
      <p class="key-title">Anthropic API Key</p>
      <p class="key-sub">La chiave viene salvata solo nel tuo browser (localStorage) e non viene mai inviata altrove.</p>
      <input class="key-input" id="key-input" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
      <div class="key-actions">
        <button class="btn" id="btn-key-cancel">Annulla</button>
        <button class="btn btn-accent" id="btn-key-save">Salva</button>
      </div>
    </div>
  </div>

  <div class="sphere-wrap" id="sphere-wrap" role="button" tabindex="0" aria-label="Generate sound">
    <div class="sphere-ring ring-4"></div>
    <div class="sphere-ring ring-3"></div>
    <div class="sphere-ring ring-2"></div>
    <div class="sphere-ring ring-1"></div>
    <div class="sphere" id="sphere"></div>
    <span class="sphere-hint" id="sphere-hint">touch to drift</span>
  </div>

  <div class="result-card" id="result-card" aria-live="polite">
    <div class="card-header">
      <p class="sound-name" id="sound-name">—</p>
      <p class="sound-meta" id="sound-meta">—</p>
    </div>
    <div class="divider" id="divider"></div>
    <p class="sound-desc" id="sound-desc">touch the sphere to begin</p>
    <div class="tags" id="tags"></div>
    <div class="actions">
      <button class="btn btn-accent" id="btn-preview">Descrizione sensoriale</button>
      <button class="btn" id="btn-ableton">Guida Ableton</button>
      <button class="btn" id="btn-export">Esporta</button>
    </div>
    <div class="tech-sheet" id="tech-sheet">
      <p class="tech-title" id="tech-title">—</p>
      <p class="tech-content" id="tech-content"></p>
    </div>
  </div>

  <footer>serendipity engine for sound designers</footer>

</div>

<script>
// ── PALETTE ──────────────────────────────────────────────────
const sounds = [
  { name:"Rusted Fog",      category:"texture · sub-bass",  tags:["sub-bass","corroded","80–120 bpm","dark"],          ca:"#5c2818", cb:"#180806", glow:"rgba(200,90,40,0.18)",  ring:"rgba(200,90,40,0.2)",  acc:"#c85a28", ar:200,ag:90, ab:40  },
  { name:"3AM Concrete",    category:"reverb · urban",       tags:["reverb","cold","any bpm","urban"],                  ca:"#142040", cb:"#060c18", glow:"rgba(80,150,220,0.16)", ring:"rgba(80,150,220,0.18)",acc:"#5096dc", ar:80, ag:150,ab:220 },
  { name:"Collapsed Sun",   category:"transient · cinematic",tags:["pitch-fall","cinematic","free","cosmic"],           ca:"#503008", cb:"#180e02", glow:"rgba(240,170,40,0.18)", ring:"rgba(240,170,40,0.2)", acc:"#f0aa28", ar:240,ag:170,ab:40  },
  { name:"Wet Circuit",     category:"glitch · organic",     tags:["glitch","organic","techno","lo-fi"],               ca:"#0a3828", cb:"#030f0a", glow:"rgba(50,200,130,0.16)", ring:"rgba(50,200,130,0.18)",acc:"#32c882", ar:50, ag:200,ab:130 },
  { name:"Pressure Front",  category:"drone · ambient",      tags:["drone","tension","slow","atmospheric"],            ca:"#201660", cb:"#080518", glow:"rgba(100,80,220,0.2)",  ring:"rgba(100,80,220,0.22)",acc:"#6450dc", ar:100,ag:80, ab:220 },
  { name:"Fractured Glass", category:"granular · percussive",tags:["granular","pitched","percussive","crystalline"],   ca:"#1a3050", cb:"#060c18", glow:"rgba(160,210,255,0.14)",ring:"rgba(160,210,255,0.16)",acc:"#a0d2ff", ar:160,ag:210,ab:255 },
  { name:"Buried Signal",   category:"mid-bass · industrial",tags:["mid-bass","saturated","industrial","dark"],        ca:"#30103c", cb:"#0c0412", glow:"rgba(170,60,200,0.18)", ring:"rgba(170,60,200,0.2)", acc:"#aa3cc8", ar:170,ag:60, ab:200 },
  { name:"Cold Automation", category:"mechanical · techno",  tags:["mechanical","grid","techno","precise"],            ca:"#102030", cb:"#04080c", glow:"rgba(120,190,220,0.15)",ring:"rgba(120,190,220,0.16)",acc:"#78bedd", ar:120,ag:190,ab:220 },
  { name:"Dissolving Shore",category:"pad · liminal",        tags:["pad","ambient","liminal","infinite"],              ca:"#0a2e38", cb:"#030c10", glow:"rgba(70,180,200,0.18)", ring:"rgba(70,180,200,0.2)", acc:"#46b4c8", ar:70, ag:180,ab:200 },
  { name:"Membrane Memory", category:"resonance · organic",  tags:["resonance","decay","mid","vocal"],                 ca:"#401810", cb:"#100604", glow:"rgba(220,110,80,0.18)", ring:"rgba(220,110,80,0.2)", acc:"#dc6e50", ar:220,ag:110,ab:80  },
  { name:"Signal Decay",    category:"noise · texture",      tags:["noise","lo-fi","degraded","tape"],                 ca:"#2a2a20", cb:"#0a0a08", glow:"rgba(200,200,140,0.14)",ring:"rgba(200,200,140,0.16)",acc:"#c8c88c", ar:200,ag:200,ab:140 },
  { name:"Seismic Breath",  category:"low-end · movement",   tags:["infra-bass","slow","breathing","massive"],         ca:"#1a1430", cb:"#080510", glow:"rgba(130,100,200,0.18)",ring:"rgba(130,100,200,0.2)", acc:"#8264c8", ar:130,ag:100,ab:200 },
];

// ── STATE ─────────────────────────────────────────────────────
let spinCount = 0;
let current = null;
let isLoading = false;

// ── API KEY ────────────────────────────────────────────────────
const KEY_STORAGE = 'drift_api_key';
function getKey() { return localStorage.getItem(KEY_STORAGE) || ''; }
function setKey(k) { localStorage.setItem(KEY_STORAGE, k); }

// ── DOM ────────────────────────────────────────────────────────
const sphereEl   = document.getElementById('sphere');
const sphereWrap = document.getElementById('sphere-wrap');
const card       = document.getElementById('result-card');
const nameEl     = document.getElementById('sound-name');
const metaEl     = document.getElementById('sound-meta');
const descEl     = document.getElementById('sound-desc');
const tagsEl     = document.getElementById('tags');
const badgeEl    = document.getElementById('spin-badge');
const bgGlow     = document.getElementById('bg-glow');
const techSheet  = document.getElementById('tech-sheet');
const techTitle  = document.getElementById('tech-title');
const techContent= document.getElementById('tech-content');
const btnPreview = document.getElementById('btn-preview');
const btnAbleton = document.getElementById('btn-ableton');
const btnExport  = document.getElementById('btn-export');
const divider    = document.getElementById('divider');
const rings      = document.querySelectorAll('.sphere-ring');
const btnKey     = document.getElementById('btn-key');
const keyOverlay = document.getElementById('key-overlay');
const keyInput   = document.getElementById('key-input');
const btnKeySave = document.getElementById('btn-key-save');
const btnKeyCancel=document.getElementById('btn-key-cancel');

// ── AMBIENT CANVAS ─────────────────────────────────────────────
(function initAmbient() {
  const canvas = document.getElementById('ambient-canvas');
  const ctx = canvas.getContext('2d');
  let cW, cH;

  function resize() {
    cW = canvas.width = window.innerWidth;
    cH = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // Lerped color state (starts purple-ish)
  let cR = 100, cG = 80, cB = 220;
  let tR = 100, tG = 80, tB = 220;

  window.setCanvasColor = function(s) {
    tR = s.ar; tG = s.ag; tB = s.ab;
  };

  // Orbs — slow drifting gaussian blobs
  const orbs = Array.from({ length: 8 }, (_, i) => ({
    cx: Math.random(),   // normalized 0-1
    cy: Math.random(),
    baseR: 160 + Math.random() * 260,
    phase:  Math.random() * Math.PI * 2,
    phaseY: Math.random() * Math.PI * 2,
    speed:  0.0006 + Math.random() * 0.0012,
    amp:    60 + Math.random() * 130,
    ampY:   40 + Math.random() * 90,
    alpha:  i < 2 ? 0.055 : i < 5 ? 0.035 : 0.018,
  }));

  // Lines — thin traces that appear, drift, fade
  function mkLine() {
    const a = (Math.random() - 0.5) * 1.2 + (Math.random() > 0.5 ? 0 : Math.PI * 0.5);
    const len = 70 + Math.random() * 200;
    const cx = Math.random() * (cW || 1000);
    const cy = Math.random() * (cH || 800);
    return {
      x1: cx - Math.cos(a) * len * 0.5, y1: cy - Math.sin(a) * len * 0.5,
      x2: cx + Math.cos(a) * len * 0.5, y2: cy + Math.sin(a) * len * 0.5,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.10,
      op: 0, maxOp: 0.025 + Math.random() * 0.06,
      life: 0, maxLife: 280 + Math.random() * 500,
      w: 0.3 + Math.random() * 0.45,
    };
  }
  const NUM_LINES = 20;
  const lines = Array.from({ length: NUM_LINES }, mkLine);

  // Floaters — micro dots rising upward
  function mkFloater(fromBottom) {
    return {
      x: Math.random() * (cW || 1000),
      y: fromBottom ? (cH || 800) + 5 + Math.random() * 30 : Math.random() * (cH || 800),
      r: 0.4 + Math.random() * 1.4,
      vx: (Math.random() - 0.5) * 0.14,
      vy: -(0.07 + Math.random() * 0.22),
      op: 0, maxOp: 0.06 + Math.random() * 0.20,
      fadeIn: 0.0012 + Math.random() * 0.002,
      fadeOut: 0.0006 + Math.random() * 0.001,
      peakAt: 0.25 + Math.random() * 0.35,
      progress: 0,
    };
  }
  const NUM_FLOATERS = 40;
  const floaters = Array.from({ length: NUM_FLOATERS }, () => mkFloater(false));

  // Click bloom flashes
  const flashes = [];
  window.addAmbientFlash = function(x, y) {
    flashes.push({ x, y, r: 10, op: 0.28, speed: 4 + Math.random() * 3 });
  };

  function draw() {
    requestAnimationFrame(draw);
    ctx.clearRect(0, 0, cW, cH);

    // Lerp color
    cR += (tR - cR) * 0.014;
    cG += (tG - cG) * 0.014;
    cB += (tB - cB) * 0.014;
    const r = Math.round(cR), g = Math.round(cG), b = Math.round(cB);

    // Orbs
    for (const orb of orbs) {
      orb.phase  += orb.speed;
      orb.phaseY += orb.speed * 0.71;
      const x = orb.cx * cW + Math.sin(orb.phase)  * orb.amp;
      const y = orb.cy * cH + Math.cos(orb.phaseY) * orb.ampY;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, orb.baseR);
      grad.addColorStop(0,   `rgba(${r},${g},${b},${orb.alpha})`);
      grad.addColorStop(0.45,`rgba(${r},${g},${b},${orb.alpha * 0.35})`);
      grad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, orb.baseR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Lines
    for (let i = 0; i < lines.length; i++) {
      const ln = lines[i];
      ln.life++;
      ln.x1 += ln.vx; ln.x2 += ln.vx;
      ln.y1 += ln.vy; ln.y2 += ln.vy;
      const p = ln.life / ln.maxLife;
      if (p < 0.2)       ln.op = Math.min(ln.maxOp, ln.op + ln.maxOp / (ln.maxLife * 0.2));
      else if (p > 0.65) ln.op = Math.max(0, ln.op - ln.maxOp / (ln.maxLife * 0.35));
      if (ln.life >= ln.maxLife) { lines[i] = mkLine(); continue; }
      if (ln.op < 0.003) continue;
      const grad = ctx.createLinearGradient(ln.x1, ln.y1, ln.x2, ln.y2);
      grad.addColorStop(0,   `rgba(${r},${g},${b},0)`);
      grad.addColorStop(0.25,`rgba(${r},${g},${b},${ln.op})`);
      grad.addColorStop(0.75,`rgba(${r},${g},${b},${ln.op})`);
      grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = ln.w;
      ctx.beginPath();
      ctx.moveTo(ln.x1, ln.y1);
      ctx.lineTo(ln.x2, ln.y2);
      ctx.stroke();
    }

    // Floaters
    for (let i = 0; i < floaters.length; i++) {
      const fl = floaters[i];
      fl.x += fl.vx;
      fl.y += fl.vy;
      fl.progress = Math.max(0, Math.min(1, 1 - (fl.y / cH)));
      if (fl.progress < fl.peakAt) fl.op = Math.min(fl.maxOp, fl.op + fl.fadeIn);
      else                          fl.op = Math.max(0, fl.op - fl.fadeOut);
      if (fl.y < -6 || fl.op <= 0) { floaters[i] = mkFloater(true); continue; }
      if (fl.op < 0.005) continue;
      ctx.fillStyle = `rgba(${r},${g},${b},${fl.op})`;
      ctx.beginPath();
      ctx.arc(fl.x, fl.y, fl.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Click bloom flashes
    for (let i = flashes.length - 1; i >= 0; i--) {
      const f = flashes[i];
      f.r    += f.speed;
      f.speed = Math.max(0.5, f.speed * 0.96);
      f.op   -= 0.007;
      if (f.op <= 0) { flashes.splice(i, 1); continue; }
      const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r);
      grad.addColorStop(0,   `rgba(${r},${g},${b},${f.op * 0.6})`);
      grad.addColorStop(0.4, `rgba(${r},${g},${b},${f.op})`);
      grad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  draw();
})();

// ── COLOR APPLY ────────────────────────────────────────────────
function applyColor(s) {
  sphereEl.style.background = `radial-gradient(circle at 36% 32%, ${s.ca}, ${s.cb} 70%)`;
  sphereEl.style.boxShadow  = `0 0 90px ${s.glow}, 0 0 180px ${s.glow.replace(/[\d.]+\)$/, '0.06)')}, inset 0 0 60px rgba(0,0,0,0.55)`;
  bgGlow.style.background   = `radial-gradient(ellipse 70% 55% at 50% 38%, ${s.glow}, transparent)`;
  rings.forEach(r => r.style.borderColor = s.ring);
  card.style.borderColor    = `rgba(${s.ar},${s.ag},${s.ab},0.18)`;
  divider.style.background  = `rgba(${s.ar},${s.ag},${s.ab},0.12)`;
  btnPreview.style.color    = s.acc;
  btnPreview.style.borderColor = `rgba(${s.ar},${s.ag},${s.ab},0.3)`;
  btnPreview.style.background  = `rgba(${s.ar},${s.ag},${s.ab},0.07)`;
  badgeEl.style.color       = `rgba(${s.ar},${s.ag},${s.ab},0.4)`;
  tagsEl.querySelectorAll('.tag').forEach(t => {
    t.style.color        = `rgba(${s.ar},${s.ag},${s.ab},0.75)`;
    t.style.borderColor  = `rgba(${s.ar},${s.ag},${s.ab},0.2)`;
    t.style.background   = `rgba(${s.ar},${s.ag},${s.ab},0.06)`;
  });
  window.setCanvasColor(s);
}

// ── RIPPLE ─────────────────────────────────────────────────────
function spawnRipple(x, y, s) {
  for (let i = 0; i < 3; i++) {
    const el = document.createElement('div');
    el.className = 'ripple';
    const size = 8;
    el.style.cssText = `
      left:${x}px; top:${y}px;
      width:${size}px; height:${size}px;
      border: 0.5px solid rgba(${s.ar},${s.ag},${s.ab},${0.6 - i * 0.15});
    `;
    el.style.setProperty('--rdur', (0.9 + i * 0.25) + 's');
    el.style.setProperty('--rdelay', (i * 110) + 'ms');
    el.style.setProperty('--rop', (0.6 - i * 0.15).toFixed(2));
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1800);
  }
}

// ── PARTICLES ──────────────────────────────────────────────────
function spawnParticles(x, y, s) {
  const count = 22;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';

    const angle = Math.random() * Math.PI * 2;
    const dist  = 35 + Math.random() * 110;
    const tx    = Math.cos(angle) * dist;
    const ty    = Math.sin(angle) * dist;

    // Vary type: bright core dots, mid dots, streaks
    let w, h, bg, glow = '', br = '50%';
    if (i < 5) {
      // bright glowing core
      const sz = 3 + Math.random() * 3;
      w = sz; h = sz;
      bg = s.acc;
      glow = `box-shadow:0 0 ${sz*2}px ${s.acc},0 0 ${sz*5}px rgba(${s.ar},${s.ag},${s.ab},0.5)`;
    } else if (i < 14) {
      // regular dots
      const sz = 1.2 + Math.random() * 2.2;
      w = sz; h = sz;
      bg = `rgba(${s.ar},${s.ag},${s.ab},${0.5 + Math.random() * 0.4})`;
    } else {
      // elongated streaks rotated toward travel direction
      const rot = Math.atan2(ty, tx) * 180 / Math.PI;
      w = 8 + Math.random() * 10; h = 1 + Math.random() * 1;
      bg = `rgba(${s.ar},${s.ag},${s.ab},0.45)`;
      br = '1px';
      p.style.setProperty('--rot', rot + 'deg');
    }

    const dur = (1.2 + Math.random() * 1) + 's';
    p.style.cssText = `
      left:${x}px; top:${y}px;
      width:${w}px; height:${h}px;
      background:${bg}; border-radius:${br};
      ${glow};
    `;
    p.style.setProperty('--tx', tx + 'px');
    p.style.setProperty('--ty', ty + 'px');
    p.style.setProperty('--dur', dur);
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

// ── CLAUDE API STREAM ──────────────────────────────────────────
async function streamFromClaude(prompt, targetEl, onDone) {
  const apiKey = getKey();
  if (!apiKey) { openKeyModal(); throw new Error('no key'); }

  targetEl.innerHTML = '<span class="cursor"></span>';

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-allow-browser': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      stream: true,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!response.ok) throw new Error('API error ' + response.status);

  const reader  = response.body.getReader();
  const decoder = new TextDecoder();
  let text = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const lines = decoder.decode(value, { stream: true }).split('\n');
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;
      try {
        const json = JSON.parse(data);
        if (json.type === 'content_block_delta' && json.delta?.text) {
          text += json.delta.text;
          targetEl.innerHTML = text + '<span class="cursor"></span>';
        }
      } catch {}
    }
  }

  targetEl.innerHTML = text;
  if (onDone) onDone(text);
}

// ── SPIN ────────────────────────────────────────────────────────
async function spin(evt) {
  if (isLoading) return;
  isLoading = true;

  spinCount++;
  const pick = sounds[Math.floor(Math.random() * sounds.length)];
  current = pick;

  // Exact click/tap position (fall back to sphere center for keyboard)
  let px, py;
  if (evt && evt.clientX != null) {
    px = evt.clientX;
    py = evt.clientY;
  } else {
    const rect = sphereEl.getBoundingClientRect();
    px = rect.left + rect.width  * 0.5;
    py = rect.top  + rect.height * 0.5;
  }

  spawnRipple(px, py, pick);
  spawnParticles(px, py, pick);
  window.addAmbientFlash(px, py);

  card.classList.remove('visible');
  techSheet.classList.remove('visible');

  await new Promise(r => setTimeout(r, 200));

  nameEl.textContent   = pick.name;
  metaEl.textContent   = pick.category;
  tagsEl.innerHTML     = pick.tags.map(t => `<span class="tag">${t}</span>`).join('');
  badgeEl.textContent  = `${spinCount} drift`;
  descEl.className     = 'sound-desc loading';
  descEl.textContent   = 'generating...';

  applyColor(pick);
  card.classList.add('visible');

  try {
    await streamFromClaude(
      `Sei un sound designer con una voce poetica e tecnica insieme. Descrivi "${pick.name}" (${pick.category}) in modo sensoriale e fisico: come suona, come si muove nel tempo, cosa si sente nel corpo. Scrivi 3-4 frasi dense, in italiano. Nessun titolo, nessuna introduzione. Solo la descrizione.`,
      descEl
    );
    descEl.classList.remove('loading');
  } catch {
    descEl.textContent = 'Connetti l\'API Anthropic per le descrizioni generate.';
    descEl.classList.remove('loading');
  }

  isLoading = false;
}

// ── API KEY MODAL ──────────────────────────────────────────────
function openKeyModal()  { keyInput.value = getKey(); keyOverlay.classList.remove('hidden'); keyInput.focus(); }
function closeKeyModal() { keyOverlay.classList.add('hidden'); }
function syncKeyIcon()   { btnKey.classList.toggle('has-key', !!getKey()); }

btnKey.addEventListener('click', openKeyModal);
btnKeyCancel.addEventListener('click', closeKeyModal);
btnKeySave.addEventListener('click', () => {
  const v = keyInput.value.trim();
  if (v) { setKey(v); syncKeyIcon(); closeKeyModal(); }
});
keyInput.addEventListener('keydown', e => {
  if (e.key === 'Enter')  btnKeySave.click();
  if (e.key === 'Escape') closeKeyModal();
});
keyOverlay.addEventListener('click', e => { if (e.target === keyOverlay) closeKeyModal(); });

syncKeyIcon();
if (!getKey()) openKeyModal();

// ── EVENTS ─────────────────────────────────────────────────────
sphereWrap.addEventListener('click', spin);
sphereWrap.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') spin(e); });
</script>
