<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f2050"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="60%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Area fill under chart line -->
  <path d="M64 390 L130 320 L190 345 L255 260 L310 290 L370 190 L420 100 L420 420 L64 420 Z" fill="url(#fill)"/>

  <!-- Chart line glow -->
  <polyline points="64,390 130,320 190,345 255,260 310,290 370,190 420,100"
    stroke="#60a5fa" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.25" filter="url(#bigglow)"/>

  <!-- Chart line -->
  <polyline points="64,390 130,320 190,345 255,260 310,290 370,190 420,100"
    stroke="url(#line)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Apex arrow pointing up -->
  <path d="M420,100 L395,148 M420,100 L445,148" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.6"/>

  <!-- Apex dot glow -->
  <circle cx="420" cy="100" r="30" fill="#93c5fd" opacity="0.3" filter="url(#bigglow)"/>
  <!-- Apex dot -->
  <circle cx="420" cy="100" r="20" fill="url(#arrow)" filter="url(#glow)"/>
  <circle cx="420" cy="100" r="9" fill="white"/>
</svg>
