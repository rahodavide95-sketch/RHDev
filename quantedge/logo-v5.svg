<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060d1f"/><stop offset="100%" stop-color="#0c1a3a"/>
    </linearGradient>
    <linearGradient id="grd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="60%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="gs"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Glow behind A -->
  <path d="M256,72 L80,448 L432,448 Z" fill="#2563eb" opacity="0.12" filter="url(#g)"/>
  <!-- Ultra-bold A, stroke only, sharp miter -->
  <path d="M256,72 L80,448 L160,448 L256,200 L352,448 L432,448 Z"
    fill="none" stroke="url(#grd)" stroke-width="46" stroke-linejoin="miter" stroke-miterlimit="10"/>
  <!-- Cutout inner -->
  <path d="M256,72 L80,448 L160,448 L256,200 L352,448 L432,448 Z"
    fill="url(#bg)" stroke="url(#bg)" stroke-width="14" stroke-linejoin="miter"/>
  <!-- Trend: brutally simple — one diagonal line, thick, electric -->
  <line x1="116" y1="324" x2="398" y2="206"
    stroke="#1d4ed8" stroke-width="36" stroke-linecap="round" opacity="0.5" filter="url(#gs)"/>
  <line x1="116" y1="324" x2="398" y2="206"
    stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- End arrow -->
  <circle cx="398" cy="206" r="38" fill="white" opacity="0.08" filter="url(#gs)"/>
  <circle cx="398" cy="206" r="16" fill="white"/>
</svg>