<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #161617;
    --bg3: #1e1e20;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #9a9a9f;
    --text3: #5a5a62;
    --accent: #5DCAA5;
    --accent-dim: rgba(93,202,165,0.12);
    --red: #E24B4A;
    --red-dim: rgba(226,75,74,0.1);
    --amber: #EF9F27;
    --radius: 10px;
    --radius-lg: 14px;
  }

  html.dark {
    --bg: #0e0e0f;
    --bg2: #161617;
    --bg3: #1e1e20;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #9a9a9f;
    --text3: #5a5a62;
    --accent: #5DCAA5;
    --accent-dim: rgba(93,202,165,0.12);
    --red: #E24B4A;
    --red-dim: rgba(226,75,74,0.1);
    --amber: #EF9F27;
  }

  html.light {
    --bg: #f5f5f7;
    --bg2: #ffffff;
    --bg3: #ebebed;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a1c;
    --text2: #56565c;
    --text3: #a0a0a8;
    --accent: #1a9e78;
    --accent-dim: rgba(26,158,120,0.1);
    --red: #d63b3a;
    --red-dim: rgba(214,59,58,0.08);
    --amber: #c97d00;
  }

  @media (prefers-color-scheme: light) {
    html:not(.dark):not(.light) {
      --bg: #f5f5f7;
      --bg2: #ffffff;
      --bg3: #ebebed;
      --border: rgba(0,0,0,0.09);
      --border2: rgba(0,0,0,0.18);
      --text: #1a1a1c;
      --text2: #56565c;
      --text3: #a0a0a8;
      --accent: #1a9e78;
      --accent-dim: rgba(26,158,120,0.1);
      --red: #d63b3a;
      --red-dim: rgba(214,59,58,0.08);
      --amber: #c97d00;
    }
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .app {
    width: 100%;
    max-width: 620px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 1.25rem;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent-dim);
    border: 1px solid rgba(93,202,165,0.25);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 16px; height: 16px; stroke: var(--accent); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  h1 { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; }
  .tagline { font-size: 12px; color: var(--text3); margin-top: 1px; }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text2);
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 6px var(--accent);
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  .dot.active { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .dot.thinking { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

  .btn-key, .btn-theme {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    color: var(--text3);
    line-height: 1;
    border-radius: 6px;
    transition: color 0.2s;
    display: flex;
    align-items: center;
  }
  .btn-key { font-size: 17px; }
  .btn-key:hover, .btn-theme:hover { color: var(--text2); }
  .btn-key.has-key { color: var(--accent); }

  .key-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  .key-overlay.hidden { display: none; }

  .key-box {
    width: 100%; max-width: 380px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 1.75rem 2rem;
  }
  .key-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 0.35rem; }
  .key-sub { font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 1.1rem; }
  .key-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--text);
    letter-spacing: 0.04em;
    outline: none;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .key-input:focus { border-color: var(--border2); }
  .key-input::placeholder { color: var(--text3); }
  .key-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-modal {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 16px;
    color: var(--text2); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s;
  }
  .btn-modal:hover { border-color: var(--border2); color: var(--text); }
  .btn-modal.primary { background: var(--accent-dim); border-color: rgba(93,202,165,0.3); color: var(--accent); }
  .btn-modal.primary:hover { background: rgba(93,202,165,0.2); }

  .controls {
    display: grid;
    grid-template-columns: 44px 1fr 44px;
    align-items: center;
    justify-items: center;
    margin-bottom: 1.75rem;
  }

  .btn-listen {
    width: 92px;
    height: 92px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 2px solid rgba(93,202,165,0.35);
    color: var(--accent);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.18s;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
    box-shadow: 0 0 0 0 rgba(93,202,165,0);
  }
  .btn-listen:hover {
    background: rgba(93,202,165,0.2);
    border-color: rgba(93,202,165,0.55);
    box-shadow: 0 0 18px rgba(93,202,165,0.15);
  }
  .btn-listen.recording {
    background: var(--red-dim);
    border-color: rgba(226,75,74,0.45);
    color: var(--red);
    box-shadow: 0 0 18px rgba(226,75,74,0.15);
  }
  .btn-listen.recording:hover { background: rgba(226,75,74,0.18); }

  .btn-reset {
    width: 36px; height: 36px;
    background: var(--red-dim);
    border: 1px solid rgba(226,75,74,0.25);
    border-radius: 50%;
    color: var(--red);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .btn-reset:hover { border-color: rgba(226,75,74,0.4); color: var(--red); background: var(--red-dim); }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    min-height: 90px;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.6rem;
  }

  .panel-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .panel-label svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.7; }

  .btn-autoreply {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 9px 3px 7px;
    color: var(--text3);
    font-size: 11px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s;
  }
  .btn-autoreply.on { border-color: rgba(80,160,255,0.4); color: rgb(80,160,255); background: rgba(80,160,255,0.1); }
  .autoreply-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3);
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .btn-autoreply.on .autoreply-dot { background: rgb(80,160,255); }

  .btn-copy {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .btn-copy:hover { color: var(--text2); background: var(--bg3); }
  .btn-copy svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .panel-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text);
    min-height: 44px;
  }

  .panel-text.placeholder { color: var(--text3); font-size: 13px; font-style: italic; }
  .interim { color: var(--text3); font-style: italic; }

  .panel.translation { background: var(--bg3); }

  .lang-swap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 0 0 1.25rem 0;
  }
  .lang-select {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 6px 10px 6px 12px;
    color: var(--text2);
    font-size: 13px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
    flex: 1;
    max-width: 160px;
    text-align: center;
  }
  .lang-select:focus { border-color: var(--border2); }
  .btn-swap {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    padding: 4px;
    display: flex;
    align-items: center;
    border-radius: 50%;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-swap:hover { color: var(--text); background: var(--bg3); }
  .btn-swap svg { transition: transform 0.3s; }
  .btn-swap:hover svg { transform: rotate(180deg); }
  .panel.response {
    border: 2px solid rgba(80,160,255,0.45);
    box-shadow: 0 0 10px rgba(80,160,255,0.08);
  }
  .panel.response.working {
    animation: pulse-blue 2s ease-in-out infinite;
  }
  @keyframes pulse-blue {
    0%, 100% { border-color: rgba(80,160,255,0.3); box-shadow: 0 0 8px rgba(80,160,255,0.06); }
    50%       { border-color: rgba(80,160,255,0.75); box-shadow: 0 0 22px rgba(80,160,255,0.25); }
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error { font-size: 13px; color: #f08080; min-height: 18px; margin-top: 4px; }

  footer {
    margin-top: 2rem;
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    line-height: 1.8;
  }

  footer a { color: var(--text3); text-decoration: underline; text-underline-offset: 2px; }
  footer a:hover { color: var(--text2); }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
      </div>
      <div>
        <div class="tagline">Call Assistant</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="status-pill">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Pronto</span>
      </div>
      <button class="btn-theme" id="btnTheme" title="Tema"></button>
      <button class="btn-key" id="btnKey" title="API Key">⚷</button>
    </div>
  </header>

  <div class="controls">
    <div></div>
    <button class="btn-listen" id="btnListen">
      <svg viewBox="0 0 24 24" style="width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <span id="btnListenTxt">Ascolta</span>
    </button>
    <button class="btn-reset" id="btnReset" title="Cancella tutto">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
    </button>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-label">
        <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        <span id="labelTranscript">Trascrizione (EN)</span>
      </div>
    </div>
    <div class="panel-text placeholder" id="transcriptBox">Premi Ascolta e parla in inglese...</div>
  </div>

  <div class="lang-swap">
    <select class="lang-select" id="selectFrom"></select>
    <button class="btn-swap" id="btnSwap" title="Scambia lingue">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16V4m0 0L3 8m4-4 4 4"/><path d="M17 8v12m0 0 4-4m-4 4-4-4"/></svg>
    </button>
    <select class="lang-select" id="selectTo"></select>
  </div>

  <div class="panel translation">
    <div class="panel-header">
      <div class="panel-label">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span id="labelTranslation">Traduzione (IT)</span>
      </div>
    </div>
    <div class="panel-text placeholder" id="translationBox">La traduzione apparirà qui...</div>
  </div>

  <div class="panel response" id="responsePanel">
    <div class="panel-header">
      <div class="panel-label">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span id="labelResponse">Risposta suggerita (EN)</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="btn-autoreply" id="btnAutoReply" title="Risposta automatica">
          <span class="autoreply-dot"></span>
          <span id="autoReplyTxt">Auto</span>
        </button>
        <button class="btn-copy" id="btnCopy">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copia
        </button>
      </div>
    </div>
    <div class="panel-text placeholder" id="responseBox">La risposta apparirà qui automaticamente...</div>
  </div>

  <div class="error" id="errorMsg"></div>



</div>

<div class="key-overlay hidden" id="keyOverlay">
  <div class="key-box">
    <p class="key-title">Anthropic API Key</p>
    <p class="key-sub">Salvata nel browser (localStorage). Non viene mai inviata a terzi.</p>
    <input class="key-input" id="keyInput" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
    <div class="key-actions">
      <button class="btn-modal" id="btnKeyCancel">Annulla</button>
      <button class="btn-modal primary" id="btnKeySave">Salva</button>
    </div>
  </div>
</div>

<script>
const btnListen   = document.getElementById('btnListen');
const btnReset    = document.getElementById('btnReset');
const btnListenTxt= document.getElementById('btnListenTxt');
const btnCopy     = document.getElementById('btnCopy');
const btnAutoReply    = document.getElementById('btnAutoReply');
const autoReplyTxt    = document.getElementById('autoReplyTxt');
const btnKey          = document.getElementById('btnKey');
const btnTheme        = document.getElementById('btnTheme');
const btnSwap         = document.getElementById('btnSwap');
const selectFrom      = document.getElementById('selectFrom');
const selectTo        = document.getElementById('selectTo');
const labelTranscript = document.getElementById('labelTranscript');
const labelTranslation= document.getElementById('labelTranslation');
const labelResponse   = document.getElementById('labelResponse');
const keyOverlay  = document.getElementById('keyOverlay');
const keyInput    = document.getElementById('keyInput');
const btnKeySave  = document.getElementById('btnKeySave');
const btnKeyCancel= document.getElementById('btnKeyCancel');
const transcriptBox = document.getElementById('transcriptBox');
const translationBox= document.getElementById('translationBox');
const responseBox   = document.getElementById('responseBox');
const responsePanel = document.getElementById('responsePanel');
const statusDot   = document.getElementById('statusDot');
const statusText  = document.getElementById('statusText');
const errorMsg    = document.getElementById('errorMsg');

let autoReply = true;

function syncAutoReply() {
  btnAutoReply.classList.toggle('on', autoReply);
  autoReplyTxt.textContent = autoReply ? 'Auto on' : 'Auto off';
}
syncAutoReply();
btnAutoReply.addEventListener('click', () => { autoReply = !autoReply; syncAutoReply(); });

let recognition = null;
let isListening = false;
let finalTranscript = '';
let translateTimeout = null;

// ── LANGUAGES ────────────────────────────────────────────────
const ALL_LANGS = [
  { code: 'en-US', label: 'Inglese',    short: 'EN' },
  { code: 'it-IT', label: 'Italiano',   short: 'IT' },
  { code: 'es-ES', label: 'Spagnolo',   short: 'ES' },
  { code: 'fr-FR', label: 'Francese',   short: 'FR' },
  { code: 'de-DE', label: 'Tedesco',    short: 'DE' },
  { code: 'pt-BR', label: 'Portoghese', short: 'PT' },
  { code: 'nl-NL', label: 'Olandese',   short: 'NL' },
  { code: 'ru-RU', label: 'Russo',      short: 'RU' },
  { code: 'zh-CN', label: 'Cinese',     short: 'ZH' },
  { code: 'ja-JP', label: 'Giapponese', short: 'JA' },
  { code: 'ko-KR', label: 'Coreano',    short: 'KO' },
  { code: 'ar-SA', label: 'Arabo',      short: 'AR' },
  { code: 'pl-PL', label: 'Polacco',    short: 'PL' },
  { code: 'tr-TR', label: 'Turco',      short: 'TR' },
  { code: 'hi-IN', label: 'Hindi',      short: 'HI' },
];

function getLangByCode(code) { return ALL_LANGS.find(l => l.code === code) || ALL_LANGS[0]; }
function fromLang() { return getLangByCode(selectFrom.value); }
function toLang()   { return getLangByCode(selectTo.value); }

function populateSelects() {
  [selectFrom, selectTo].forEach(sel => {
    sel.innerHTML = ALL_LANGS.map(l =>
      `<option value="${l.code}">${l.label} (${l.short})</option>`
    ).join('');
  });
  selectFrom.value = 'en-US';
  selectTo.value   = 'it-IT';
}

function updateLabels() {
  const f = fromLang(), t = toLang();
  labelTranscript.textContent  = `Trascrizione (${f.short})`;
  labelTranslation.textContent = `Traduzione (${t.short})`;
  labelResponse.textContent    = `Risposta suggerita (${f.short})`;
}

function resetPanels() {
  const f = fromLang();
  setPanel(transcriptBox,  `Premi Ascolta e parla in ${f.label.toLowerCase()}...`, true);
  setPanel(translationBox, 'La traduzione apparirà qui...', true);
  setPanel(responseBox,    'La risposta apparirà qui automaticamente...', true);
  errorMsg.textContent = '';
  setStatus('', 'Pronto');
}

populateSelects();
updateLabels();

[selectFrom, selectTo].forEach(sel => sel.addEventListener('change', () => {
  if (isListening) stopListening();
  finalTranscript = '';
  clearTimeout(translateTimeout);
  updateLabels();
  resetPanels();
}));

btnSwap.addEventListener('click', () => {
  if (isListening) stopListening();
  const tmp = selectFrom.value;
  selectFrom.value = selectTo.value;
  selectTo.value   = tmp;
  finalTranscript  = '';
  clearTimeout(translateTimeout);
  updateLabels();
  resetPanels();
});

// ── THEME ────────────────────────────────────────────────────
const THEME_STORAGE = 'callassistant_theme';
const THEME_ICONS = {
  system: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/><line x1="2" y1="2" x2="22" y2="22" stroke-width="1.5"/></svg>',
  light:  '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
  dark:   '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
};
const THEME_CYCLE = ['system', 'light', 'dark'];
function applyTheme(t) {
  document.documentElement.classList.remove('light', 'dark');
  if (t === 'light' || t === 'dark') document.documentElement.classList.add(t);
  btnTheme.innerHTML = THEME_ICONS[t];
  btnTheme.title = { system: 'Sistema', light: 'Chiaro', dark: 'Scuro' }[t];
}
function nextTheme() {
  const cur = localStorage.getItem(THEME_STORAGE) || 'system';
  const next = THEME_CYCLE[(THEME_CYCLE.indexOf(cur) + 1) % THEME_CYCLE.length];
  localStorage.setItem(THEME_STORAGE, next);
  applyTheme(next);
}
applyTheme(localStorage.getItem(THEME_STORAGE) || 'system');
btnTheme.addEventListener('click', nextTheme);

// ── API KEY ───────────────────────────────────────────────────
const KEY_STORAGE = 'callassistant_api_key';
function getKey()  { return localStorage.getItem(KEY_STORAGE) || ''; }
function setKey(k) { localStorage.setItem(KEY_STORAGE, k); }
function openKeyModal()  { keyInput.value = getKey(); keyOverlay.classList.remove('hidden'); keyInput.focus(); }
function closeKeyModal() { keyOverlay.classList.add('hidden'); }
function syncKeyIcon()   { btnKey.classList.toggle('has-key', !!getKey()); }

btnKey.addEventListener('click', openKeyModal);
btnKeySave.addEventListener('click', () => {
  const k = keyInput.value.trim();
  if (!k.startsWith('sk-ant-')) { showError('La key deve iniziare con sk-ant-'); return; }
  setKey(k); syncKeyIcon(); closeKeyModal();
});
btnKeyCancel.addEventListener('click', closeKeyModal);
keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') btnKeySave.click(); if (e.key === 'Escape') closeKeyModal(); });
keyOverlay.addEventListener('click', e => { if (e.target === keyOverlay) closeKeyModal(); });

syncKeyIcon();

function setStatus(state, text) {
  statusDot.className = 'dot' + (state ? ' ' + state : '');
  statusText.textContent = text;
}

function showError(msg) {
  errorMsg.textContent = msg;
  setTimeout(() => errorMsg.textContent = '', 5000);
}

function setPanel(el, html, isPlaceholder) {
  el.innerHTML = html;
  el.className = 'panel-text' + (isPlaceholder ? ' placeholder' : '');
}

btnCopy.addEventListener('click', () => {
  const txt = responseBox.textContent.trim();
  if (!txt || responseBox.classList.contains('placeholder')) return;
  navigator.clipboard.writeText(txt).then(() => {
    btnCopy.innerHTML = '<svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:var(--accent);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;"><polyline points="20 6 9 17 4 12"/></svg> Copiato';
    setTimeout(() => {
      btnCopy.innerHTML = '<svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copia';
    }, 2000);
  });
});

async function callClaude(system, userMsg, maxTokens) {
  const key = getKey();
  if (!key) { openKeyModal(); throw new Error('API key mancante'); }
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens || 500,
      system: system,
      messages: [{ role: 'user', content: userMsg }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  if (!data.content) throw new Error('Risposta API non valida');
  return data.content.map(b => b.text || '').join('');
}

async function translateText(text) {
  if (!text.trim()) return;
  setStatus('thinking', 'Traduco...');
  setPanel(translationBox, '<span class="spinner"></span>', false);
  try {
    const f = fromLang(), t = toLang();
    const prompt = `You are a precise translator. Translate the following text from ${f.label} to ${t.label}. Reply ONLY with the translation, no explanation or preamble.`;
    const result = await callClaude(prompt, text, 600);
    setPanel(translationBox, result.trim(), false);
    setStatus('', 'Tradotto');
    if (autoReply) await suggestReply();
  } catch(e) {
    setPanel(translationBox, 'Errore di traduzione.', true);
    showError(e.message);
    setStatus('', 'Errore');
  }
}

async function suggestReply() {
  const topic = finalTranscript.trim();
  if (!topic) return;
  setStatus('thinking', 'Genero risposta...');
  setPanel(responseBox, '<span class="spinner"></span>', false);
  responsePanel.classList.add('working');
  try {
    const f = fromLang();
    const replyPrompt = `You are a helpful assistant supporting someone on a professional business call. Given what was just said by the other person, suggest a concise, natural, professional reply in ${f.label}. Write ONLY the reply itself — no preamble, no labels, no quotes.`;
    const result = await callClaude(replyPrompt, 'The other person just said: ' + topic, 500);
    setPanel(responseBox, result.trim(), false);
    setStatus('', 'Pronto');
  } catch(e) {
    setPanel(responseBox, 'Errore nel generare la risposta.', true);
    showError(e.message);
    setStatus('', 'Errore');
  } finally {
    responsePanel.classList.remove('working');
  }
}

function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showError('Browser non supportato. Usa Chrome o Edge.');
    return null;
  }
  const r = new SR();
  r.lang = fromLang().code;
  r.interimResults = true;
  r.continuous = true;
  r.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    const display = finalTranscript + (interim ? '<span class="interim">' + interim + '</span>' : '');
    setPanel(transcriptBox, display || '<span class="interim">In ascolto...</span>', false);
    if (finalTranscript.trim()) {
      clearTimeout(translateTimeout);
      translateTimeout = setTimeout(() => translateText(finalTranscript.trim()), 1200);
    }
  };
  r.onerror = (e) => {
    if (e.error !== 'no-speech') { showError('Errore microfono: ' + e.error); stopListening(); }
  };
  r.onend = () => { if (isListening) r.start(); };
  return r;
}

function startListening() {
  if (!getKey()) { openKeyModal(); return; }
  recognition = initRecognition();
  if (!recognition) return;
  finalTranscript = '';
  setPanel(transcriptBox, `<span class="interim">In ascolto (${fromLang().short})...</span>`, false);
  setPanel(translationBox, 'La traduzione apparirà qui...', true);
  setPanel(responseBox, 'La risposta apparirà qui automaticamente...', true);
  isListening = true;
  recognition.start();
  btnListen.classList.add('recording');
  btnListenTxt.textContent = 'Stop';
  setStatus('active', 'In ascolto...');
}

function stopListening() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  btnListen.classList.remove('recording');
  btnListenTxt.textContent = 'Ascolta';
  setStatus('', finalTranscript.trim() ? 'Completato' : 'Pronto');
  if (finalTranscript.trim()) { clearTimeout(translateTimeout); translateText(finalTranscript.trim()); }
}

btnListen.addEventListener('click', () => { isListening ? stopListening() : startListening(); });
btnReset.addEventListener('click', () => {
  if (isListening) stopListening();
  finalTranscript = '';
  clearTimeout(translateTimeout);
  setPanel(transcriptBox, 'Premi Ascolta e parla in inglese...', true);
  setPanel(translationBox, 'La traduzione apparirà qui...', true);
  setPanel(responseBox, 'La risposta apparirà qui automaticamente...', true);
  errorMsg.textContent = '';
  setStatus('', 'Pronto');
});
</script>
