<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1e46"/>
      <stop offset="100%" stop-color="#1a2f6b"/>
    </linearGradient>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Triangle outline, centered -->
  <polygon points="256,80 420,340 92,340" fill="none" stroke="url(#lg1)" stroke-width="16" stroke-linejoin="round"/>
  <!-- Trend line inside -->
  <polyline points="120,320 176,240 232,274 332,170" stroke="url(#lg1)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Apex dot -->
  <circle cx="332" cy="170" r="26" fill="url(#lg1)"/>

  <!-- APEX -->
  <text x="256" y="420" font-family="Inter,Arial,sans-serif" font-size="88" font-weight="800" letter-spacing="6" text-anchor="middle" fill="url(#lg1)">APEX</text>
  <!-- Finance -->
  <text x="256" y="458" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="500" letter-spacing="14" text-anchor="middle" fill="#8b9ab8">FINANCE</text>
</svg>
