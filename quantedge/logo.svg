<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f2050"/>
    </linearGradient>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="trend" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Isosceles triangle — two sides only, no base (= A shape) -->
  <!-- Glow layer -->
  <polyline points="80,432 256,80 432,432"
    stroke="rgba(59,130,246,0.3)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#bigglow)"/>
  <!-- Main stroke -->
  <polyline points="80,432 256,80 432,432"
    stroke="url(#lg1)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trend line as crossbar — rising left to right -->
  <!-- Glow -->
  <polyline points="130,318 210,284 272,298 358,244"
    stroke="#60a5fa" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"
    opacity="0.4" filter="url(#bigglow)"/>
  <!-- Main -->
  <polyline points="130,318 210,284 272,298 358,244"
    stroke="url(#trend)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Apex dot -->
  <circle cx="256" cy="80" r="50" fill="url(#lg1)" opacity="0.15" filter="url(#bigglow)"/>
  <circle cx="256" cy="80" r="18" fill="white" filter="url(#glow)" opacity="0.6"/>
  <circle cx="256" cy="80" r="10" fill="white"/>

  <!-- Trend end dot -->
  <circle cx="358" cy="244" r="32" fill="#93c5fd" opacity="0.2" filter="url(#bigglow)"/>
  <circle cx="358" cy="244" r="11" fill="white"/>
</svg>
