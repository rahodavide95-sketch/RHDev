<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1e46"/>
      <stop offset="100%" stop-color="#1a2f6b"/>
    </linearGradient>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="420" height="120" rx="24" fill="url(#bg)"/>

  <!-- Icon: triangle outline -->
  <polygon points="60,18 104,98 16,98" fill="none" stroke="url(#lg1)" stroke-width="4" stroke-linejoin="round"/>
  <!-- Trend line -->
  <polyline points="24,88 40,64 56,73 78,42" stroke="url(#lg1)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Apex dot -->
  <circle cx="78" cy="42" r="6" fill="url(#lg1)"/>

  <!-- APEX text -->
  <text x="128" y="72" font-family="Inter,Arial,sans-serif" font-size="52" font-weight="800" letter-spacing="4" fill="url(#textgrad)">APEX</text>
  <!-- FINANCE text -->
  <text x="131" y="92" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500" letter-spacing="8" fill="#8b9ab8">FINANCE</text>
</svg>
