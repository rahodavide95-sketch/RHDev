<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f2050"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Glow behind the A -->
  <path d="M256 80 L430 400 L380 400 L256 160 L132 400 L82 400 Z" fill="#3b82f6" opacity="0.12" filter="url(#softglow)"/>

  <!-- A crossbar glow -->
  <rect x="158" y="284" width="196" height="30" rx="15" fill="#60a5fa" opacity="0.2" filter="url(#glow)"/>

  <!-- A left leg -->
  <path d="M256 72 L74 430 L122 430 L256 158 Z" fill="url(#g1)"/>
  <!-- A right leg -->
  <path d="M256 72 L438 430 L390 430 L256 158 Z" fill="url(#g2)"/>
  <!-- A crossbar -->
  <rect x="158" y="284" width="196" height="28" rx="14" fill="url(#g1)"/>

  <!-- Apex dot (top of the A) -->
  <circle cx="256" cy="80" r="14" fill="white" filter="url(#glow)"/>
  <circle cx="256" cy="80" r="9" fill="white"/>
</svg>
