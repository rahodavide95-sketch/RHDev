<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f2050"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Glow behind bars -->
  <rect x="96" y="240" width="80" height="190" rx="16" fill="#3b82f6" opacity="0.15" filter="url(#glow)"/>
  <rect x="216" y="160" width="80" height="270" rx="16" fill="#60a5fa" opacity="0.15" filter="url(#glow)"/>
  <rect x="336" y="88"  width="80" height="342" rx="16" fill="#93c5fd" opacity="0.15" filter="url(#glow)"/>

  <!-- Bar 1 -->
  <rect x="96"  y="248" width="80" height="182" rx="14" fill="url(#g3)"/>
  <!-- Bar 2 -->
  <rect x="216" y="168" width="80" height="262" rx="14" fill="url(#g2)"/>
  <!-- Bar 3 (tallest) -->
  <rect x="336" y="96"  width="80" height="334" rx="14" fill="url(#g1)"/>

  <!-- Trend line connecting tops -->
  <polyline points="136,248 256,168 376,96" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Dots on tops -->
  <circle cx="136" cy="248" r="10" fill="white" opacity="0.7"/>
  <circle cx="256" cy="168" r="10" fill="white" opacity="0.85"/>
  <circle cx="376" cy="96"  r="12" fill="white"/>
</svg>
