<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sphere" cx="38%" cy="32%" r="72%">
      <stop offset="0%"   stop-color="#b0b1ff"/>
      <stop offset="28%"  stop-color="#6e6ef5"/>
      <stop offset="62%"  stop-color="#312e8a"/>
      <stop offset="100%" stop-color="#0c0a1c"/>
    </radialGradient>
    <radialGradient id="ambient" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4c3bbf" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#2a1e80" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#100840" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hl" cx="35%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <clipPath id="round">
      <rect width="200" height="200" rx="46"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#05050a" rx="46"/>

  <g clip-path="url(#round)">
    <!-- Ambient glow -->
    <circle cx="100" cy="105" r="80" fill="url(#ambient)" filter="url(#glow)"/>

    <!-- Sphere shadow/depth ring -->
    <circle cx="100" cy="100" r="60" fill="none"
            stroke="#1a1050" stroke-width="6" opacity="0.5"/>

    <!-- Main sphere -->
    <circle cx="100" cy="100" r="58" fill="url(#sphere)"/>

    <!-- Soft inner highlight -->
    <circle cx="100" cy="100" r="58" fill="url(#hl)"/>

    <!-- Specular blob -->
    <ellipse cx="84" cy="80" rx="18" ry="13"
             fill="white" opacity="0.10" filter="url(#soft)"/>

    <!-- Specular bright dot -->
    <circle cx="80" cy="76" r="5.5"
            fill="white" opacity="0.22" filter="url(#soft)"/>
    <circle cx="78" cy="74" r="2.8" fill="white" opacity="0.60"/>
  </g>
</svg>
