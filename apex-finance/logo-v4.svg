<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060d1f"/><stop offset="100%" stop-color="#0c1a3a"/>
    </linearGradient>
    <linearGradient id="a" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="tr" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Very wide, squat, modern A — different proportions -->
  <path d="M256,96 L48,448 L132,448 L256,226 L380,448 L464,448 Z"
    fill="none" stroke="url(#a)" stroke-width="36" stroke-linejoin="round"/>
  <!-- Cover inner to make hollow -->
  <path d="M256,96 L48,448 L132,448 L256,226 L380,448 L464,448 Z"
    fill="url(#bg)" stroke="url(#bg)" stroke-width="10" stroke-linejoin="round"/>
  <!-- Trend: stepped upward — like a staircase breakout -->
  <polyline points="100,330 100,296 186,296 186,256 282,256 282,214 406,214"
    stroke="url(#tr)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="406" cy="214" r="14" fill="white"/>
</svg>